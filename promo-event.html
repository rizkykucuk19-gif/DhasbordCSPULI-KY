    ];
    const modalBackdrop=document.getElementById('modalBackdrop'),toastWrap=document.getElementById('toastWrap'),toastText=document.getElementById('toastText'),sparkleContainer=document.getElementById('sparkleContainer'),particlesContainer=document.getElementById('particlesContainer');
    function createParticles(){for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*20+'s';p.style.animationDuration=(15+Math.random()*12)+'s';const s=3+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';const c=['rgba(0,217,255,0.7)','rgba(255,107,107,0.7)','rgba(255,217,61,0.6)'];p.style.background='radial-gradient(circle,'+c[Math.floor(Math.random()*c.length)]+',transparent)';particlesContainer.appendChild(p)}}
    function renderPromoGrid(){const g=document.getElementById('promoGrid');if(!g)return;g.innerHTML=eventData.map((item,i)=>`<div class="promo-card" style="animation-delay:${i*0.07}s"><div class="promo-card-img-wrapper"><img class="promo-card-img" src="${item.url}" alt="${item.caption}" loading="lazy"><div class="promo-card-overlay"></div></div><div class="promo-card-content"><div class="promo-card-title"><i class="fas fa-gift"></i> ${item.caption}</div><div class="promo-card-hint"><i class="fas fa-eye"></i> ${T[currentLang].clickPreview}</div></div></div>`).join('');g.querySelectorAll('.promo-card').forEach((el,i)=>{el.addEventListener('click',()=>openModal(eventData[i].caption,eventData[i].url))})}
    window.openModal=function(caption,url){currentModalUrl=url;document.getElementById('modalTitle').textContent=caption;document.getElementById('modalImg').src=url;modalBackdrop.classList.add('active');document.body.style.overflow='hidden'};
    window.closeModal=function(){modalBackdrop.classList.remove('active');document.body.style.overflow=''};
    window.openImageTab=function(){if(currentModalUrl)window.open(currentModalUrl,'_blank')};
    window.copyImage=async function(){const sp=document.getElementById('copySpinner');sp.style.display='inline-block';try{const r=await fetch(currentModalUrl,{mode:'cors',cache:'no-cache'});const b=await r.blob();await navigator.clipboard.write([new ClipboardItem({[b.type]:b})]);showToast(T[currentLang].copied)}catch{try{await navigator.clipboard.writeText(currentModalUrl);showToast(T[currentLang].copied)}catch{showToast(T[currentLang].copyFailed)}}sp.style.display='none'};
    modalBackdrop.addEventListener('click',e=>{if(e.target===modalBackdrop)closeModal()});
    function showToast(msg){toastText.textContent=msg;toastWrap.classList.add('visible');setTimeout(()=>toastWrap.classList.remove('visible'),2800)}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
    window.onload=function(){createParticles();const sl=localStorage.getItem('lang')||'en';currentLang=sl;document.querySelectorAll('[data-lang-id]').forEach(el=>{const t=el.getAttribute('data-lang-'+currentLang);if(t)el.textContent=t});renderPromoGrid()};
  })();
  </script>
</body>
</html>
