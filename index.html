<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Dashboard | Rizky Prayogi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: #f1f5f9;
        }

        .sidebar {
            width: 280px;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(56, 189, 248, 0.25);
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo-wrapper {
            width: 45px;
            height: 45px;
            background: #0f172a;
            border-radius: 10px;
            border: 1px solid rgba(56, 189, 248, 0.4);
            overflow: hidden;
        }

        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .brand-text h2 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* NAVIGATION */
        .nav-container { flex: 1; overflow-y: auto; }
        .nav-btn {
            width: 100%;
            padding: 12px 15px;
            margin: 5px 0;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid transparent;
            color: #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.5);
            color: #38bdf8;
        }

        .content {
            flex: 1;
            margin: 15px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .footer-sidebar {
            margin-top: auto;
            text-align: center;
            font-size: 0.65rem;
            opacity: 0.4;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand-area">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/bgCBqwDM/image.png" alt="Logo">
        </div>
        <div class="brand-text">
            <h2>RIZKY PRAYOGI</h2>
            <p style="font-size: 0.55rem; color: #38bdf8;">DASHBOARD ADMIN</p>
        </div>
    </div>
    
    <div class="nav-container">
        <button class="nav-btn active" onclick="loadPage('filter-scetter.html', this)">
            <i class="fas fa-filter"></i> <span>Filter Scetter</span>
        </button>

        <button class="nav-btn" onclick="loadPage('promo-event.html', this)">
            <i class="fas fa-gift"></i> <span>Promo Event</span>
        </button>

        <button class="nav-btn" onclick="loadPage('lottery-predict.html', this)">
            <i class="fas fa-dice"></i> <span>Lottery Predict</span>
        </button>

        <button class="nav-btn" onclick="loadPage('pembukuan.html', this)">
            <i class="fas fa-wallet"></i> <span>Pembukuan</span>
        </button>
    </div>

    <div class="footer-sidebar">
        <p>© 2026 RPM • POIPET</p>
    </div>
</div>

<div class="content">
    <iframe id="mainFrame" src="filter-scetter.html"></iframe>
</div>

<script>
    function loadPage(url, btn) {
        document.getElementById('mainFrame').src = url;
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
