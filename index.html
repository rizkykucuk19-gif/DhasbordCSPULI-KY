<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Dashboard | Rizky Prayogi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: #f1f5f9;
        }

        /* SIDEBAR GLASSMORPHIC */
        .sidebar {
            width: 280px;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(56, 189, 248, 0.25);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 32px rgba(0, 0, 0, 0.3);
        }

        .brand-area {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo-wrapper {
            width: 50px;
            height: 50px;
            background: #0f172a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(56, 189, 248, 0.4);
            overflow: hidden;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-text h2 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* NAVIGATION */
        .nav-btn {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid transparent;
            color: #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.5);
            color: #38bdf8;
            transform: translateX(5px);
        }

        .nav-btn i { font-size: 1.1rem; }

        /* CONTENT AREA */
        .content {
            flex: 1;
            margin: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff; /* Agar konten dashboard putih tetap bersih */
        }

        /* Footer Sidebar */
        .footer-sidebar {
            margin-top: auto;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.4;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand-area">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/bgCBqwDM/image.png" alt="IKY Logo">
        </div>
        <div class="brand-text">
            <h2>RIZKY PRAYOGI</h2>
            <p style="font-size: 0.6rem; color: #38bdf8;">DASHBOARD V2.0</p>
        </div>
    </div>
    
    <div class="nav-container">
        <button class="nav-btn active" onclick="loadPage('filter-scetter.html', this)">
            <i class="fas fa-filter"></i> <span>Filter Scetter</span>
        </button>
        
        <button class="nav-btn" onclick="loadPage('pembukuan.html', this)">
            <i class="fas fa-wallet"></i> <span>PROMO EVEN</span>
        </button>
        
        <button class="nav-btn" onclick="loadPage('notes_cs.html', this)">
            <i class="fas fa-sticky-note"></i> <span>PREDIKSI TOGEL</span>
        </button>
    </div>

    <div class="footer-sidebar">
        <p>© 2026 RIZKY PRAYOGI • RPM</p>
    </div>
</div>

<div class="content">
    <iframe id="mainFrame" src="filter-scetter.html"></iframe>
</div>

<script>
    function loadPage(url, btn) {
        // Ganti src Iframe
        const frame = document.getElementById('mainFrame');
        frame.style.opacity = '0.5';
        
        setTimeout(() => {
            frame.src = url;
            frame.style.opacity = '1';
        }, 150);

        // Atur tombol aktif
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
