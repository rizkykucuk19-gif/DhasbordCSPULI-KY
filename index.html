<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Dashboard - RPM</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #0f172a; color: white; }
        .sidebar { width: 250px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; }
        .sidebar h2 { color: #38bdf8; font-size: 1.2rem; margin-bottom: 30px; text-align: center; }
        .nav-btn { width: 100%; padding: 12px; margin: 8px 0; background: #334155; border: none; color: white; cursor: pointer; border-radius: 6px; text-align: left; transition: 0.3s; }
        .nav-btn:hover { background: #38bdf8; color: #0f172a; }
        .content { flex: 1; display: flex; flex-direction: column; }
        iframe { border: none; width: 100%; height: 100%; background: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>RIZKY PRAYOGI</h2>
        <button class="nav-btn" onclick="loadPage('filter-scetter.html')">🎰 Filter Scetter KY</button>
        <button class="nav-btn" onclick="loadPage('pembukuan.html')">💰 Pembukuan Duit</button>
        <button class="nav-btn" onclick="loadPage('notes_cs.html')">📝 Notes CS Line</button>
    </div>

    <div class="content">
        <iframe id="mainFrame" src="home_content.html"></iframe>
    </div>

    <script>
        function loadPage(url) {
            document.getElementById('mainFrame').src = url;
        }
    </script>

</body>
</html>
