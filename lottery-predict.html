<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lottery Predict - IKY MANIS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#050a12;--bg-mid:#0a1628;--bg-card:rgba(10,22,40,0.92);--border-glow:rgba(0,217,255,0.15);--coral:#ff6b6b;--gold:#ffd93d;--gold-dark:#f4a261;--cyan:#00d9ff;--teal:#00b894;--text-bright:#f0f6fc;--text-normal:#c9d1d9;--text-muted:#6e7681;--gradient-fire:linear-gradient(135deg,#ff6b6b,#f4a261,#ffd93d);--gradient-ocean:linear-gradient(135deg,#00d9ff,#00b894,#00a8cc);--glow-cyan:0 0 30px rgba(0,217,255,0.4)}
    *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;font-size:16px}body{background:var(--bg-deep);font-family:'Outfit',sans-serif;color:var(--text-bright);min-height:100vh;overflow-x:hidden;line-height:1.6}
    .bg-container{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 40%,rgba(0,217,255,0.08) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 80% 60%,rgba(255,107,107,0.06) 0%,transparent 50%),radial-gradient(ellipse 100% 100% at 50% 100%,rgba(255,217,61,0.04) 0%,transparent 40%),linear-gradient(180deg,var(--bg-deep) 0%,var(--bg-mid) 50%,var(--bg-deep) 100%)}.mesh-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,217,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,0.03) 1px,transparent 1px);background-size:60px 60px;animation:meshMove 20s linear infinite}@keyframes meshMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}.orb{position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 25s ease-in-out infinite}.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(255,107,107,0.15),transparent 70%);top:-10%;left:-10%}.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,217,255,0.12),transparent 70%);bottom:-15%;right:-5%;animation-delay:-8s}.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(255,217,61,0.1),transparent 70%);top:40%;right:20%;animation-delay:-15s}@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-30px) scale(1.1)}50%{transform:translate(-30px,50px) scale(0.95)}75%{transform:translate(40px,20px) scale(1.05)}}
    .particles-container{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}.particle{position:absolute;border-radius:50%;animation:particleRise linear infinite;opacity:0}@keyframes particleRise{0%{transform:translateY(100vh) rotate(0deg) scale(0);opacity:0}10%{opacity:.8}90%{opacity:.8}100%{transform:translateY(-100px) rotate(720deg) scale(1);opacity:0}}
    .sparkle-container{position:fixed;inset:0;z-index:999;pointer-events:none}.sparkle{position:absolute;width:12px;height:12px;background:var(--gold);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:sparklePop .8s ease-out forwards;box-shadow:0 0 10px var(--gold)}@keyframes sparklePop{0%{transform:scale(0) rotate(0deg);opacity:1}50%{transform:scale(1.5) rotate(180deg);opacity:1}100%{transform:scale(0) rotate(360deg);opacity:0}}
    .page-wrapper{position:relative;z-index:2;padding:32px 36px;max-width:1100px;margin:0 auto}
    .page-header{text-align:center;margin-bottom:36px;position:relative}.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;font-weight:400;background:var(--gradient-ocean);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;line-height:1.1;margin-bottom:10px}.page-header p{color:var(--text-muted);font-size:.9rem;letter-spacing:1px}.page-header::after{content:'';position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);width:80px;height:3px;background:var(--gradient-fire);border-radius:10px;animation:linePulse 3s ease infinite}@keyframes linePulse{0%,100%{width:80px;opacity:1}50%{width:140px;opacity:.6}}
    .back-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:var(--bg-card);border:1px solid var(--border-glow);border-radius:14px;color:var(--text-normal);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .35s ease;text-decoration:none;margin-bottom:28px;font-family:inherit;backdrop-filter:blur(15px)}.back-btn:hover{border-color:var(--cyan);color:var(--cyan);transform:translateX(-5px);box-shadow:0 8px 25px rgba(0,217,255,0.15)}.back-btn i{transition:transform .35s ease}.back-btn:hover i{transform:translateX(-4px)}
    .predictor-layout{display:grid;grid-template-columns:1fr 280px;gap:28px;animation:heroIn .8s ease backwards}@keyframes heroIn{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .predictor-main{background:var(--bg-card);backdrop-filter:blur(25px);border:1px solid var(--border-glow);border-radius:24px;padding:32px;box-shadow:0 20px 50px -15px rgba(0,0,0,0.5);transition:all .35s ease}.predictor-main:hover{box-shadow:0 25px 60px -10px rgba(0,0,0,0.6)}.predictor-actions{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap}
    .btn{padding:16px 28px;border-radius:14px;font-weight:700;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:12px;transition:all .4s ease;border:none;letter-spacing:.5px;font-family:inherit;position:relative;overflow:hidden}.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform .7s ease}.btn:hover::before{transform:translateX(100%)}.btn-primary{background:var(--gradient-fire);color:#fff;box-shadow:0 8px 25px rgba(255,107,107,0.4)}.btn-primary:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(255,107,107,0.5)}.btn-secondary{background:0 0;border:1px solid var(--border-glow);color:var(--text-bright)}.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-4px)}
    .market-select{flex:1;min-width:200px;position:relative}.market-input{width:100%;padding:16px 20px;background:rgba(5,10,18,0.7);border:1px solid var(--border-glow);border-radius:14px;color:var(--text-bright);font-size:.9rem;font-family:inherit;cursor:pointer;transition:all .35s ease}.market-input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,217,255,0.1)}.market-list{position:absolute;top:calc(100% + 10px);left:0;right:0;background:var(--bg-card);backdrop-filter:blur(25px);border:1px solid var(--border-glow);border-radius:14px;max-height:250px;overflow-y:auto;display:none;z-index:50;box-shadow:0 25px 55px rgba(0,0,0,0.5)}.market-list.show{display:block;animation:dropdownReveal .3s ease}@keyframes dropdownReveal{from{opacity:0;transform:translateY(-15px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}.market-option{padding:14px 18px;cursor:pointer;transition:all .25s ease;border-bottom:1px solid var(--border-glow);font-size:.9rem;color:var(--text-bright)}.market-option:last-child{border-bottom:none}.market-option:hover{background:rgba(0,217,255,0.1);padding-left:26px;color:var(--cyan)}
    .output-box{background:rgba(5,10,18,0.8);border-radius:18px;padding:28px;min-height:340px;font-family:'Space Grotesk',monospace;font-size:.92rem;line-height:2;white-space:pre-wrap;color:var(--text-bright);border:1px solid rgba(0,217,255,0.15);box-shadow:inset 0 6px 20px rgba(0,0,0,0.5);transition:all .35s ease}.output-box:hover{border-color:rgba(0,217,255,0.3);box-shadow:inset 0 6px 20px rgba(0,0,0,0.5),0 0 25px rgba(0,217,255,0.1)}
    .predictor-side{background:var(--bg-card);backdrop-filter:blur(25px);border:1px solid var(--border-glow);border-radius:24px;padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 20px 50px -15px rgba(0,0,0,0.5);transition:all .35s ease}.predictor-side:hover{box-shadow:0 25px 60px -10px rgba(0,0,0,0.6)}.market-logo{width:110px;height:110px;object-fit:contain;margin-bottom:18px;border-radius:50%;background:rgba(0,217,255,0.05);padding:10px;transition:all .6s ease;border:2px solid rgba(0,217,255,0.2)}.predictor-side:hover .market-logo{transform:scale(1.2) rotate(15deg);border-color:var(--cyan);box-shadow:0 0 35px rgba(0,217,255,0.35)}.market-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;font-weight:400;background:var(--gradient-ocean);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:2px}.market-sub{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:3px;font-weight:600}
    .disclaimer-text{text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border-glow);color:var(--text-muted);font-size:.82rem;font-style:italic}
    .toast-wrap{position:fixed;bottom:28px;right:28px;background:linear-gradient(135deg,var(--bg-card),rgba(10,22,40,0.98));backdrop-filter:blur(25px);border:1px solid rgba(0,217,255,0.3);border-radius:18px;padding:18px 28px;display:flex;align-items:center;gap:16px;z-index:1100;transform:translateX(140%);opacity:0;transition:all .45s cubic-bezier(.4,0,.2,1);box-shadow:0 25px 55px rgba(0,0,0,0.5)}.toast-wrap.visible{transform:translateX(0);opacity:1}.toast-wrap i{color:var(--teal);font-size:1.3rem}.toast-wrap span{font-weight:700;font-size:.92rem}
    ::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:rgba(5,10,18,0.6)}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--cyan),var(--coral));border-radius:10px}
    @media(max-width:900px){.page-wrapper{padding:24px 18px}.predictor-layout{grid-template-columns:1fr}.predictor-side{order:-1}}
    @media(max-width:600px){.predictor-actions{flex-direction:column}.btn{width:100%;justify-content:center}.market-select{width:100%}.market-logo{width:90px;height:90px}.market-name{font-size:1.3rem}.page-header h1{font-size:2.2rem}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div class="bg-container"><div class="bg-gradient"></div><div class="mesh-grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="particles-container" id="particlesContainer"></div>
  <div class="sparkle-container" id="sparkleContainer"></div>
  <div class="page-wrapper">
    <a class="back-btn" href="index.html"><i class="fas fa-arrow-left"></i> <span data-lang-id="Kembali" data-lang-en="Back">Back</span></a>
    <div class="page-header"><h1 data-lang-id="Elite Predictor" data-lang-en="Elite Predictor">Elite Predictor</h1><p data-lang-id="Prediksi angka togel untuk semua pasaran" data-lang-en="Lottery number prediction for all markets">Lottery number prediction for all markets</p></div>
    <div class="predictor-layout">
      <div class="predictor-main">
        <div class="predictor-actions">
          <button class="btn btn-primary" onclick="generatePredict('btn')"><i class="fas fa-sync-alt"></i><span data-lang-id="Acak Angka" data-lang-en="Shuffle Numbers">Shuffle Numbers</span></button>
          <button class="btn btn-secondary" onclick="copyPredict()"><i class="fas fa-copy"></i><span data-lang-id="Copy" data-lang-en="Copy">Copy</span></button>
          <div class="market-select">
            <input type="text" class="market-input" id="marketInput" data-lang-id-placeholder="Pilih Pasaran" data-lang-en-placeholder="Select Market" placeholder="Select Market" onfocus="showMarketList()" oninput="filterMarkets()" autocomplete="off">
            <div class="market-list" id="marketList"></div>
          </div>
        </div>
        <div class="output-box" id="predictOutput"></div>
      </div>
      <div class="predictor-side">
        <img id="marketLogo" class="market-logo" src="" alt="Market">
        <div class="market-name" id="marketName">PASARAN</div>
        <div class="market-sub" data-lang-id="Official Prediction" data-lang-en="Official Prediction">Official Prediction</div>
      </div>
    </div>
    <div class="disclaimer-text" data-lang-id="Biasakan UPS - Utamakan Prediksi Sendiri" data-lang-en="Always UPS - Prioritize Your Own Prediction">Always UPS - Prioritize Your Own Prediction</div>
  </div>
  <div class="toast-wrap" id="toastWrap"><i class="fas fa-check-circle"></i><span id="toastText">Success</span></div>
  <script>
  (function(){
    'use strict';
    const T={id:{copied:'Berhasil disalin',copyFailed:'Gagal menyalin',shuffled:'Angka berhasil diacak',marketSelected:'Pasaran terpilih'},en:{copied:'Successfully copied',copyFailed:'Failed to copy',shuffled:'Numbers shuffled successfully',marketSelected:'Market selected'}};
    let currentLang='en',currentMarket="Hoki Draw",currentPrediction="";
    const markets=[{name:"Bangkok",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/BKK01/icon/icon.png"},{name:"Brunei",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/BRU14/icon/icon.png"},{name:"Bullseye",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/BLE/icon/icon.png"},{name:"California",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/CLF/icon/icon.png"},{name:"Carolina Evening",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/NCD2/icon/icon.png"},{name:"Chelsea",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/CHS11/icon/icon.png"},{name:"Florida",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/FLM/icon/icon.png"},{name:"New York",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/NYM/icon/icon.png"},{name:"Hoki Draw",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/HKDW/icon/icon.png"},{name:"Hongkong Lotto",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/HKGLT/icon/icon.png"},{name:"Huahin",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/HUA02/icon/icon.png"},{name:"Kentucky",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/KTE/icon/icon.png"},{name:"King Kong4D",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/KK1/icon/icon.png"},{name:"Magnum4D",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/MAG/icon/icon.png"},{name:"Nevada",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/NVD/icon/icon.png"},{name:"North Carolina Day",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/NCD/icon/icon.png"},{name:"Oregon",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/ORG12/icon/icon.png"},{name:"PCSO",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/PCO/icon/icon.png"},{name:"Poipet",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/PPT12/icon/icon.png"},{name:"Singapore",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/SGD/icon/icon.png"},{name:"Sydney Lotto",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/SYDLT/icon/icon.png"},{name:"Toto Cambodia Live",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/TTC/icon/icon.png"},{name:"Toto Macau",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/TTM1/icon/icon.png"},{name:"Toto Mali",img:"https://png-res.png999.com/assets/LOTTERY-Web/cardList/MALI15/icon/icon.png"}];
    const shioData=[{n:"Kuda",v:"01,13,25,37,49,61,73,85,97"},{n:"Ular",v:"02,14,26,38,50,62,74,86,98"},{n:"Naga",v:"03,15,27,39,51,63,75,87,99"},{n:"Kelinci",v:"04,16,28,40,52,64,76,88,00"},{n:"Harimau",v:"05,17,29,41,53,65,77,89"},{n:"Kerbau",v:"06,18,30,42,54,66,78,90"},{n:"Tikus",v:"07,19,31,43,55,67,79,91"},{n:"Babi",v:"08,20,32,44,56,68,80,92"},{n:"Anjing",v:"09,21,33,45,57,69,81,93"},{n:"Ayam",v:"10,22,34,46,58,70,82,94"},{n:"Monyet",v:"11,23,35,47,59,71,83,95"},{n:"Kambing",v:"12,24,36,48,60,72,84,96"}];
    const marketInput=document.getElementById('marketInput'),marketList=document.getElementById('marketList'),toastWrap=document.getElementById('toastWrap'),toastText=document.getElementById('toastText'),particlesContainer=document.getElementById('particlesContainer');
    function createParticles(){for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*20+'s';p.style.animationDuration=(15+Math.random()*12)+'s';const s=3+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';const c=['rgba(0,217,255,0.7)','rgba(255,107,107,0.7)','rgba(255,217,61,0.6)'];p.style.background='radial-gradient(circle,'+c[Math.floor(Math.random()*c.length)]+',transparent)';particlesContainer.appendChild(p)}}
    window.showMarketList=function(){marketList.classList.add('show');filterMarkets()};
    window.filterMarkets=function(){const q=marketInput.value.toUpperCase();const f=markets.filter(m=>m.name.toUpperCase().includes(q));marketList.innerHTML=f.map(m=>`<div class="market-option" data-name="${m.name}">${m.name}</div>`).join('');marketList.querySelectorAll('.market-option').forEach(o=>{o.addEventListener('click',()=>{currentMarket=o.dataset.name;marketInput.value=o.dataset.name;marketList.classList.remove('show');generatePredict('market')})})};
    document.addEventListener('click',e=>{if(!e.target.closest('.market-select'))marketList.classList.remove('show')});
    window.generatePredict=function(type){const m=markets.find(x=>x.name===currentMarket)||markets[8];const now=new Date();const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];const ds=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;const rand=(len,count)=>{const r=[];for(let i=0;i<count;i++){let n='';for(let j=0;j<len;j++)n+=Math.floor(Math.random()*10).toString();r.push(n)}return r.join(' ')};let bbfs='';for(let i=0;i<8;i++)bbfs+=Math.floor(Math.random()*10).toString();const ai=bbfs.substring(0,4);document.getElementById('marketLogo').src=m.img;document.getElementById('marketName').innerText=m.name.toUpperCase();let out=`PREDIKSI ${m.name.toUpperCase()}\n${ds}\nBBFS KUAT: ${bbfs}\nAngka Ikut : ${ai}\n`;if(currentMarket==="Hoki Draw")out+=`5D (BB): ${rand(5,4)}\n`;out+=`4D (BB): ${rand(4,4)}\n3D (BB) : ${rand(3,4)}\n2D (BB): ${rand(2,10)}\nColok Bebas : ${bbfs[0]}/${bbfs[1]}\nColok Macau : ${rand(2,1)}/${rand(2,1)}/${rand(2,1)}\n`;const sh=[...shioData].sort(()=>0.5-Math.random());out+=`Colok Shio : ${sh.slice(0,3).map(s=>s.n.toUpperCase()).join('/')}\nInvest Twin : ${bbfs[2]}${bbfs[2]}/${bbfs[3]}${bbfs[3]}/${bbfs[4]}${bbfs[4]}\n\nBiasakan UPS - UTAMAKAN PREDIKSI SENDIRI`;currentPrediction=out;document.getElementById('predictOutput').textContent=out;if(type==='btn')showToast(T[currentLang].shuffled);if(type==='market')showToast(T[currentLang].marketSelected)};
    window.copyPredict=function(){if(!currentPrediction)generatePredict('copy');navigator.clipboard.writeText(currentPrediction).then(()=>showToast(T[currentLang].copied)).catch(()=>showToast(T[currentLang].copyFailed))};
    function showToast(msg){toastText.textContent=msg;toastWrap.classList.add('visible');setTimeout(()=>toastWrap.classList.remove('visible'),2800)}
    window.onload=function(){createParticles();const sl=localStorage.getItem('lang')||'en';currentLang=sl;document.querySelectorAll('[data-lang-id]').forEach(el=>{const t=el.getAttribute('data-lang-'+currentLang);if(t)el.textContent=t});document.querySelectorAll('[data-lang-'+currentLang+'-placeholder]').forEach(el=>{const p=el.getAttribute('data-lang-'+currentLang+'-placeholder');if(p)el.placeholder=p});marketInput.value="Hoki Draw";generatePredict()};
  })();
  </script>
</body>
</html>
